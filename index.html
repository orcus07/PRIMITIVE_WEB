<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회의록 작성기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>📝 회의록 작성기</h1>
    <p class="subtitle">브라우저에 자동 저장되는 간단한 회의록 도구</p>
  </header>

  <main class="layout">
    <!-- 왼쪽: 저장된 회의록 목록 -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <button id="new-btn" class="btn btn-primary">+ 새 회의록</button>
        <input id="search" type="search" placeholder="제목·내용 검색…" />
      </div>
      <ul id="list" class="list"></ul>
      <p id="empty-list" class="muted hidden">저장된 회의록이 없습니다.</p>
    </aside>

    <!-- 오른쪽: 작성/편집 폼 -->
    <section class="editor">
      <form id="form">
        <div class="row">
          <label class="field grow">
            <span>제목</span>
            <input id="title" type="text" placeholder="예) 3분기 기획 회의" required />
          </label>
          <label class="field">
            <span>날짜</span>
            <input id="date" type="date" required />
          </label>
        </div>

        <label class="field">
          <span>참석자 <small class="muted">(쉼표로 구분)</small></span>
          <input id="attendees" type="text" placeholder="홍길동, 김철수, 이영희" />
        </label>

        <label class="field">
          <span>안건</span>
          <textarea id="agenda" rows="2" placeholder="오늘 논의할 안건"></textarea>
        </label>

        <label class="field">
          <span>논의 내용</span>
          <textarea id="discussion" rows="6" placeholder="회의에서 오간 내용을 기록하세요"></textarea>
        </label>

        <label class="field">
          <span>결정 사항</span>
          <textarea id="decisions" rows="3" placeholder="합의·결정된 사항"></textarea>
        </label>

        <label class="field">
          <span>실행 항목 (Action Items) <small class="muted">(한 줄에 하나)</small></span>
          <textarea id="actions" rows="3" placeholder="홍길동 - 보고서 초안 작성 (6/20까지)"></textarea>
        </label>

        <div class="actions-bar">
          <button type="submit" class="btn btn-primary">저장</button>
          <button type="button" id="print-btn" class="btn">인쇄 / PDF</button>
          <button type="button" id="export-btn" class="btn">텍스트 내보내기</button>
          <button type="button" id="delete-btn" class="btn btn-danger hidden">삭제</button>
          <span id="status" class="status"></span>
        </div>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
